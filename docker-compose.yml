services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: health_ledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d health_ledger"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/health_ledger?schema=public
      JWT_SECRET: replace-with-a-long-random-secret
      JWT_EXPIRES_IN: 1d
      PORT: 4000
      FRONTEND_URL: http://localhost:5173
      UPLOAD_DIR: uploads/food-images
    ports:
      - "4000:4000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma migrate deploy &&
        echo '' &&
        echo '==================================================' &&
        echo '🚀 Health Ledger is running successfully!' &&
        echo '' &&
        echo '🌐 Frontend : http://localhost:5173' &&
        echo '🔧 Backend  : http://localhost:4000' &&
        echo '🗄️  Database : localhost:5432' &&
        echo '==================================================' &&
        echo '' &&
        node dist/server.js
      "

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads: